<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>In Development</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(-45deg, #0a001f, #1a0033, #2d0066, #120024);
      background-size: 400% 400%;
      animation: gradientMove 12s ease infinite;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Glow container */
    .container {
      text-align: center;
      z-index: 2;
    }

    /* Glitch text */
    .glitch {
      font-size: 3rem;
      font-weight: bold;
      position: relative;
      color: #fff;
      text-shadow: 0 0 10px #a855f7, 0 0 20px #9333ea;
      animation: flicker 2s infinite;
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
      55% { opacity: 0.4; }
      60% { opacity: 1; }
    }

    .sub {
      margin-top: 15px;
      font-size: 1.2rem;
      opacity: 0.8;
      letter-spacing: 1px;
    }

    /* Neon line */
    .line {
      margin: 25px auto;
      width: 120px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #a855f7, transparent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.3; transform: scaleX(0.5); }
      50% { opacity: 1; transform: scaleX(1); }
      100% { opacity: 0.3; transform: scaleX(0.5); }
    }

    /* Floating particles */
    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(168, 85, 247, 0.5);
      animation: float linear infinite;
    }

    @keyframes float {
      from {
        transform: translateY(100vh) scale(0.5);
        opacity: 0;
      }
      to {
        transform: translateY(-10vh) scale(1);
        opacity: 1;
      }
    }

    /* Footer */
    .footer {
      position: absolute;
      bottom: 20px;
      font-size: 0.8rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="glitch">IN DEVELOPMENT</div>
    <div class="line"></div>
    <div class="sub">Something cool is loading...</div>
  </div>

  <div class="footer">.space — coming soon</div>

  <script>
    // Create floating particles
    const count = 40;

    for (let i = 0; i < count; i++) {
      const p = document.createElement("div");
      p.classList.add("particle");

      const size = Math.random() * 4 + 2;
      p.style.width = size + "px";
      p.style.height = size + "px";

      p.style.left = Math.random() * 100 + "vw";
      p.style.animationDuration = (Math.random() * 10 + 5) + "s";
      p.style.animationDelay = Math.random() * 5 + "s";

      document.body.appendChild(p);
    }
  </script>

</body>
</html>
